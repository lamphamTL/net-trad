name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from VERSION file
        id: ver
        run: |
          VERSION=$(cat VERSION)
          echo "v=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release ${{ steps.ver.outputs.tag }} already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: 20

      - name: Install web-ext
        if: steps.check.outputs.skip != 'true'
        run: npm install -g web-ext@8

      - name: Sync manifest version
        if: steps.check.outputs.skip != 'true'
        run: |
          jq --arg v "${{ steps.ver.outputs.v }}" \
            '.version = $v' src/manifest.json > src/manifest.tmp.json
          mv src/manifest.tmp.json src/manifest.json
          cat src/manifest.json

      - name: Prepare dist
        if: steps.check.outputs.skip != 'true'
        run: mkdir -p dist

      # ---------- Firefox ----------
      - name: Sign Firefox xpi
        if: steps.check.outputs.skip != 'true'
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          web-ext sign \
            --source-dir=src \
            --artifacts-dir=dist/firefox \
            --channel=unlisted
          mv dist/firefox/*.xpi "dist/netflix-subs-firefox-v${{ steps.ver.outputs.v }}.xpi"

      # ---------- Chrome ----------
      - name: Build Chrome zip
        if: steps.check.outputs.skip != 'true'
        run: |
          rm -rf chrome-build
          cp -r src chrome-build
          jq '.background = {service_worker: "background.js"} | del(.browser_specific_settings)' \
            chrome-build/manifest.json > chrome-build/manifest.tmp.json
          mv chrome-build/manifest.tmp.json chrome-build/manifest.json
          cd chrome-build
          zip -r "../dist/netflix-subs-chrome-v${{ steps.ver.outputs.v }}.zip" .

      # ---------- updates.json (Firefox auto-update) ----------
      - name: Generate updates.json
        if: steps.check.outputs.skip != 'true'
        run: |
          cat > dist/updates.json <<EOF
          {
            "addons": {
              "netflix-custom-subs@local.dev": {
                "updates": [
                  {
                    "version": "${{ steps.ver.outputs.v }}",
                    "update_link": "https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/netflix-subs-firefox-v${{ steps.ver.outputs.v }}.xpi"
                  }
                ]
              }
            }
          }
          EOF
          cat dist/updates.json

      - name: List artifacts
        if: steps.check.outputs.skip != 'true'
        run: ls -la dist/

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/netflix-subs-firefox-v${{ steps.ver.outputs.v }}.xpi
            dist/netflix-subs-chrome-v${{ steps.ver.outputs.v }}.zip
            dist/updates.json
